          - generic [ref=e25]:
            - heading "The problem" [level=2] [ref=e26]
            - paragraph [ref=e27]:
              - text: SIATA (Metropolitan Early Warning System) needed a platform to manage
              - strong [ref=e28]: terrestrial and maritime
              - text: "logistics shipments at a national and international scale. The system had to cover the full cycle: client registration, product catalog, warehouse and port management, shipment guide creation with data validation, and status tracking for each dispatch."
            - paragraph [ref=e29]: "The challenge was twofold: meet the functional requirements with precise business rules (volume discounts, vehicle plate and fleet number validation, unique tracking numbers), and demonstrate design judgment in the architecture, code quality, and technical decisions — the factors that differentiate a Senior profile from a Junior one in the evaluation."
            - heading "The solution" [level=2] [ref=e30]
            - paragraph [ref=e31]:
              - strong [ref=e32]: slogs
              - text: (Siata Logistics System) is a full-stack application with a fully separated backend and frontend, independently deployed to production.
            - paragraph [ref=e33]: "The dashboard centralizes real-time business KPIs: total active shipments, terrestrial/maritime breakdown, monthly revenue, and an interactive map of active routes with Colombia's logistics nodes (Bogotá, Medellín, Cali, Cartagena, Buenaventura, and more). The recent activity feed shows each tracking number's status with its associated client."
            - paragraph [ref=e34]: "The implemented modules cover the full spec:"
            - list [ref=e35]:
              - listitem [ref=e36]:
                - strong [ref=e37]: Terrestrial
                - text: — delivery plan with product type, quantity, dates, destination warehouse, price, vehicle plate (format
                - code [ref=e38]: AAA123
                - text: ), and tracking number (10 alphanumeric characters)
              - listitem [ref=e39]:
                - strong [ref=e40]: Maritime
                - text: — delivery plan with destination port, fleet number (format
                - code [ref=e41]: AAA1234A
                - text: ), and the same uniqueness and quantity validations
              - listitem [ref=e42]:
                - strong [ref=e43]: Clients, Products, Warehouses, Ports
                - text: — full CRUD for each entity
            - paragraph [ref=e44]: "Business rules are encapsulated in the backend service layer: automatic 5% discount on terrestrial shipments with more than 10 units, 3% for maritime, and exhaustive validations before persisting each record."
            - paragraph [ref=e45]:
              - strong [ref=e46]: Bonus features
              - text: implemented include JWT bearer token authentication, full REST API documentation, error handling with appropriate HTTP codes (400, 401, 422, 500), and SPA navigation on the frontend.
            - heading "Technical decisions" [level=2] [ref=e47]
            - paragraph [ref=e48]:
              - strong [ref=e49]: Python + FastAPI
              - text: "for the backend — the spec required it, and FastAPI is the natural choice for modern REST APIs in Python: Pydantic typing, automatic OpenAPI/Swagger documentation, async performance, and declarative payload validation. Complex business rules (discounts, plate format with regex) live in the service layer, separated from controllers."
            - paragraph [ref=e50]:
              - strong [ref=e51]: PostgreSQL
              - text: as the database engine — the most solid of the proposed options for modeling the relationships between clients, shipments, products, warehouses, and ports. The ER model was designed before writing any code, with foreign keys and constraints that make it impossible to create a shipment without an associated client at the database level, not just at the application level.
            - paragraph [ref=e52]:
              - strong [ref=e53]: Next.js + TypeScript
              - text: "for the frontend — real layer separation, end-to-end typing, and an SPA with smooth navigation that avoids page reloads. Choosing Next.js over a plain SPA (CRA or Vite) was intentional: it demonstrates judgment for picking tools with a long roadmap and mature ecosystem."
            - paragraph [ref=e54]:
              - strong [ref=e55]: Separate deployment
              - text: — frontend on Vercel, backend on an independent service. This architecture is more complex to configure but reflects how real production systems are deployed.
            - heading "Results" [level=2] [ref=e56]
            - paragraph [ref=e57]: The system covers 100% of mandatory requirements and 7 of the 8 optional bonus features — a result the assessment defines as a Senior-level evaluation criterion.
            - paragraph [ref=e58]: "The most interesting part of the exercise wasn't the implementation itself, but the design decisions that differentiate it from a Junior solution: layer separation (router / service / repository), database-level validations in addition to application-level ones, consistent error handling throughout the API, and a frontend that consumes the API in a typed way without duplicating business logic on the client."
